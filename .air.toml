root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/tw ./server/cmd/tw"
entrypoint = "./tmp/tw"
include_ext = ["go"]
exclude_dir = ["tmp", "build", "dist", "node_modules", "web"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "5s"

[log]
main_only = false
silent = true

[misc]
clean_on_exit = true
startup_banner = ""
